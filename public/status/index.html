<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepBrief AI — 研究進度</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="scan-line"></div>

  <div class="container">
    <a href="/" class="logo" style="text-decoration:none">Deep<span>Brief</span> AI</a>
    <p class="tagline">Mission Status · Real-time Tracking</p>

    <div class="card" id="statusCard">
      <div class="card-corner-tr"></div>
      <div class="card-corner-bl"></div>

      <div class="topic-line" id="topicLine">
        TOPIC &nbsp;/&nbsp; <span id="topicText">—</span>
      </div>

      <div class="status-header">
        <div class="status-title" id="statusTitle">LOADING…</div>
        <span id="statusBadge" class="status-badge"></span>
      </div>

      <ul class="progress-steps" id="progressSteps"></ul>

      <div id="doneMessage"   style="display:none" class="alert success"></div>
      <div id="downloadSection" style="display:none" class="download-section"></div>
      <div id="errorMessage"  style="display:none" class="alert error"></div>
    </div>

    <p class="footer">
      AUTO-REFRESH EVERY 5s &nbsp;·&nbsp;
      <a href="/">NEW MISSION</a>
    </p>
  </div>

  <script src="/config.js"></script>
  <script>
    const STEPS = [
      { key: 'planning',   label: '規劃研究架構',   en: 'PLANNING'   },
      { key: 'collecting', label: '蒐集資料來源',   en: 'COLLECTING' },
      { key: 'analyzing',  label: '深度分析內容',   en: 'ANALYZING'  },
      { key: 'writing',    label: '撰寫研究報告',   en: 'WRITING'    },
      { key: 'reviewing',  label: '品質審核校稿',   en: 'REVIEWING'  },
      { key: 'delivering', label: '產出與寄送報告', en: 'DELIVERING' },
      { key: 'done',       label: '完成',           en: 'COMPLETE'   },
    ];
    const STEP_ORDER = STEPS.map(s => s.key);

    const params = new URLSearchParams(window.location.search);
    const jobId  = params.get('id');
    if (!jobId) window.location.href = '/';

    let pollTimer = null;

    function getStepState(stepKey, currentStatus) {
      if (currentStatus === 'error') return 'pending';
      const stepIdx    = STEP_ORDER.indexOf(stepKey);
      const currentIdx = STEP_ORDER.indexOf(currentStatus);
      if (stepIdx < currentIdx) return 'done';
      if (stepIdx === currentIdx) return 'active';
      return 'pending';
    }

    function renderSteps(currentStatus) {
      const ul = document.getElementById('progressSteps');
      ul.innerHTML = '';
      STEPS.forEach((step, i) => {
        const state = getStepState(step.key, currentStatus);
        const li    = document.createElement('li');
        li.className = state;

        const icon = document.createElement('span');
        icon.className = 'step-icon';
        if (state === 'done')   icon.textContent = '✓';
        else if (state === 'active') icon.textContent = '›';
        else icon.textContent = String(i + 1).padStart(2, '0');

        const wrap = document.createElement('div');

        const label = document.createElement('span');
        label.textContent = step.label;

        wrap.appendChild(label);
        li.appendChild(icon);
        li.appendChild(wrap);
        ul.appendChild(li);
      });
    }

    function updateUI(job) {
      const status = job.status;

      // Topic
      document.getElementById('topicText').textContent = job.topic || '—';

      // Badge
      const badge = document.getElementById('statusBadge');
      badge.className = 'status-badge ' + status;
      const labels = {
        planning:   '規劃中',  collecting: '蒐集中',
        analyzing:  '分析中',  writing:    '撰寫中',
        reviewing:  '審核中',  delivering: '寄送中',
        done: '完成', error: '錯誤'
      };
      badge.textContent = labels[status] || status;

      // Title
      const titleEl = document.getElementById('statusTitle');
      if (status === 'done')  titleEl.textContent = 'MISSION COMPLETE';
      else if (status === 'error') titleEl.textContent = 'MISSION FAILED';
      else titleEl.textContent = 'IN PROGRESS…';

      renderSteps(status);

      if (status === 'done') {
        const done = document.getElementById('doneMessage');
        done.style.display = 'block';
        done.textContent   = '報告已寄送至 ' + job.email + '，請查收信箱（含垃圾郵件匣）。';
        loadDownloadLinks(jobId);
        stopPoll();
      }

      if (status === 'error') {
        const err = document.getElementById('errorMessage');
        err.style.display = 'block';
        err.textContent   = job.error_message || '處理過程發生錯誤，請重新提交。';
        stopPoll();
      }
    }

    async function fetchStatus() {
      try {
        const res = await fetch((window.API_URL || '') + '/api/jobs/' + encodeURIComponent(jobId));
        if (!res.ok) throw new Error('HTTP ' + res.status);
        updateUI(await res.json());
      } catch (e) {
        document.getElementById('statusTitle').textContent = 'CONNECTION ERROR';
      }
    }

    function stopPoll() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }

    async function loadDownloadLinks(id) {
      try {
        const res = await fetch((window.API_URL || '') + '/api/jobs/' + encodeURIComponent(id) + '/files');
        const { files } = await res.json();
        if (!files || files.length === 0) return;

        const section = document.getElementById('downloadSection');
        section.style.display = 'block';

        const label = document.createElement('div');
        label.className   = 'download-label';
        label.textContent = 'Download Reports';
        section.appendChild(label);

        files.forEach(f => {
          const a = document.createElement('a');
          a.href      = (window.API_URL || '') + f.url;
          a.className = 'download-btn';
          a.textContent = f.name;
          section.appendChild(a);
        });
      } catch (e) { /* silent */ }
    }

    fetchStatus();
    pollTimer = setInterval(fetchStatus, 5000);
  </script>
</body>
</html>
